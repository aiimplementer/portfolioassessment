<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio — Wealth Assessment</title>

<style>
:root{
--bg:#0b0f1a;
--panel:#111827;
--panel-soft:#0f172a;
--border:rgba(255,255,255,.08);
--text:#f8fafc;
--muted:#94a3b8;
--accent:#22d3ee;
--accent-2:#3b82f6;
--success:#22c55e;
--error:#ef4444;
--radius:14px;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:Inter,system-ui,-apple-system,sans-serif;
background:
radial-gradient(600px 300px at 80% -10%,rgba(34,211,238,.15),transparent 60%),
linear-gradient(180deg,#0b1220,#070b14);
color:var(--text);
min-height:100vh;
}

.page{
max-width:1200px;
margin:auto;
padding:16px;
}

/* HEADER BAR */
.header-bar{
display:flex;
align-items:center;
justify-content:space-between;
padding:12px 20px;
background:var(--panel-soft);
border:1px solid var(--border);
border-radius:12px;
margin-bottom:12px;
box-shadow:0 4px 14px rgba(0,0,0,.35);
gap:12px;
flex-wrap:wrap;
}

.logo{
height:42px;
max-width:100%;
}

.user-area-header{
font-size:16px;
font-weight:600;
text-align:center;
flex:1;
min-width:220px;
}

.top-menu{
display:flex;
align-items:center;
gap:18px;
flex-wrap:wrap;
justify-content:center;
}

.logged-user{
font-size:13px;
color:var(--muted);
}

/* MENU LINKS */
.menu-link{
color:var(--muted);
text-decoration:none;
font-size:14px;
font-weight:500;
background:transparent;
border:none;
cursor:pointer;
position:relative;
transition:.25s ease;
}

.menu-link:hover{color:var(--accent)}

.menu-link::after{
content:"";
position:absolute;
left:0;
bottom:-4px;
width:0%;
height:2px;
background:linear-gradient(90deg,var(--accent),var(--accent-2));
transition:.3s ease;
}

.menu-link:hover::after{width:100%}

.logout-btn{
padding:6px 16px;
border-radius:999px;
font-weight:600;
background:linear-gradient(135deg,var(--accent),var(--accent-2));
color:#001018;
}

.menu-link.active{
color:var(--accent);
font-weight:600;
}

.menu-link.active::after{
width:100%;
}

/* HERO */
header{
padding:14px 10px;
border-radius:14px;
background:var(--panel-soft);
border:1px solid var(--border);
margin-bottom:16px;
text-align:center;
}

header p{
font-size:14px;
color:var(--muted);
margin:0;
}

/* CARDS */
.upload-card{
background:var(--panel);
border:1px solid var(--border);
border-radius:var(--radius);
padding:18px;
margin-bottom:16px;
transition:.2s ease;
width:100%;
}

.upload-card:hover{
border-color:rgba(255,255,255,.18);
}

.upload-card h2{
margin:0 0 12px 0;
font-size:18px;
font-weight:600;
color:var(--accent);
}

/* REPORT TYPE */
.report-type-card{
display:flex;
flex-direction:column;
gap:14px;
}

/* PILLS */
.pill-selector{
display:flex;
flex-wrap:wrap;
gap:10px;
}

.pill-selector input[type="radio"]{display:none;}

.pill{
padding:8px 16px;
font-size:12px;
border-radius:999px;
border:1px solid var(--border);
background:#0b1220;
color:var(--muted);
cursor:pointer;
transition:.2s ease;
}

.pill:hover{
border-color:var(--accent);
color:var(--accent);
}

.pill-selector input[type="radio"]:checked + .pill{
background:linear-gradient(135deg,var(--accent),var(--accent-2));
color:#001018;
font-weight:600;
}

/* FORM */
#uploadForm{
display:flex;
flex-direction:column;
gap:14px;
width:100%;
}

input[type="file"]{
width:100%;
padding:12px;
font-size:13px;
border-radius:10px;
border:1px dashed rgba(255,255,255,.15);
background:#0b1220;
color:var(--text);
}

input[type="file"]::file-selector-button{
margin-right:14px;
padding:6px 14px;
border-radius:999px;
border:none;
background:linear-gradient(135deg,var(--accent),var(--accent-2));
color:#001018;
font-weight:600;
font-size:12px;
cursor:pointer;
}

.btn-submit{
width:100%;
padding:12px;
font-size:14px;
font-weight:700;
border-radius:999px;
border:none;
background:linear-gradient(135deg,var(--accent),var(--accent-2));
color:#001018;
cursor:pointer;
transition:.2s ease;
}

.btn-submit:disabled{
opacity:.5;
cursor:not-allowed;
}

#message{
font-size:14px;
color:var(--muted);
text-align:center;
min-height:20px;
}

/* RESULT */
#result{
display:none;
margin-top:20px;
padding:20px;
border-radius:14px;
background:#fff;
color:#0f172a;
overflow-x:auto;
}

#result table{
width:100%;
border-collapse:collapse;
font-size:13px;
min-width:600px;
}

#result thead th{
background:#0f172a;
color:#fff;
padding:10px;
}

#result td{
padding:8px 10px;
border-bottom:1px solid #e2e8f0;
}

.gain{color:var(--success);font-weight:600}
.loss{color:var(--error);font-weight:600}

/* FOOTER */
.footer-bar{
display:flex;
flex-wrap:wrap;
justify-content:space-between;
align-items:center;
gap:12px;
padding:14px 10px;
font-size:12px;
border-top:1px solid var(--border);
color:var(--muted);
margin-top:10px;
}

.footer-status{
display:flex;
flex-wrap:wrap;
gap:14px;
}

.status-item{
display:flex;
align-items:center;
gap:6px;
}

.dot{
width:7px;
height:7px;
border-radius:50%;
background:#6b7280;
}

.dot.up{background:var(--success)}
.dot.down{background:var(--error)}

/* MOBILE */
@media (max-width:768px){

.header-bar{
flex-direction:column;
align-items:center;
text-align:center;
}

.top-menu{
justify-content:center;
}

.user-area-header{
order:2;
}

.logo{
order:1;
}

}

@media print{
header,.upload-card,#message,.top-menu{display:none!important}
body{background:#fff!important}
#result{display:block!important;padding:0}
}

</style>
