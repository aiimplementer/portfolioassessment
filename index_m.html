<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio — Wealth Assessment</title>

<style>
:root{
--bg:#0b0f1a;
--panel:#111827;
--panel-soft:#0f172a;
--border:rgba(255,255,255,.08);
--text:#f8fafc;
--muted:#94a3b8;
--accent:#22d3ee;
--accent-2:#3b82f6;
--success:#22c55e;
--error:#ef4444;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:Inter,system-ui,-apple-system,sans-serif;
background:linear-gradient(180deg,#0b1220,#070b14);
color:var(--text);
min-height:100vh;
}

.page{
max-width:1100px;
margin:auto;
padding:20px;
}

/* HEADER */

.header-bar{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 20px;
background:var(--panel-soft);
border:1px solid var(--border);
border-radius:12px;
margin-bottom:20px;
flex-wrap:wrap;
gap:12px;
}

.logo{
font-weight:700;
font-size:18px;
color:var(--accent);
}

.top-menu{
display:flex;
gap:16px;
flex-wrap:wrap;
}

.menu-link{
color:var(--muted);
text-decoration:none;
font-size:14px;
cursor:pointer;
}

.menu-link:hover{
color:var(--accent);
}

/* CARD */

.card{
background:var(--panel);
border:1px solid var(--border);
border-radius:14px;
padding:20px;
margin-bottom:20px;
}

.card h2{
margin-top:0;
color:var(--accent);
}

/* FORM */

form{
display:flex;
flex-direction:column;
gap:16px;
}

input[type="file"]{
padding:12px;
border-radius:10px;
border:1px dashed rgba(255,255,255,.15);
background:#0b1220;
color:var(--text);
}

button{
padding:12px;
border-radius:999px;
border:none;
font-weight:700;
cursor:pointer;
background:linear-gradient(135deg,var(--accent),var(--accent-2));
color:#001018;
}

button:disabled{
opacity:.6;
cursor:not-allowed;
}

#message{
text-align:center;
font-size:14px;
color:var(--muted);
min-height:20px;
}

/* RESULT */

#result{
display:none;
background:#ffffff;
color:#0f172a;
border-radius:14px;
padding:20px;
overflow-x:auto;
}

#result table{
width:100%;
border-collapse:collapse;
min-width:600px;
}

#result th, #result td{
padding:10px;
border-bottom:1px solid #e2e8f0;
text-align:left;
}

#result th{
background:#0f172a;
color:#fff;
}

/* FOOTER */

.footer{
text-align:center;
font-size:12px;
color:var(--muted);
margin-top:30px;
}

/* MOBILE */

@media(max-width:768px){
.header-bar{
flex-direction:column;
text-align:center;
}
}
</style>
</head>

<body>

<div class="page">

<div class="header-bar">
<div class="logo">Wealth Portal</div>
<div class="top-menu">
<a class="menu-link">Dashboard</a>
<a class="menu-link">Reports</a>
<a class="menu-link">Logout</a>
</div>
</div>

<div class="card">
<h2>Upload Portfolio File</h2>

<form id="uploadForm">
<input type="file" id="fileInput" required>
<button type="submit" id="submitBtn">Generate Report</button>
</form>

<div id="message"></div>
</div>

<div id="result"></div>

<div class="footer">
© 2026 Wealth Assessment System
</div>

</div>

<script>
const form = document.getElementById("uploadForm");
const message = document.getElementById("message");
const resultDiv = document.getElementById("result");
const submitBtn = document.getElementById("submitBtn");

form.addEventListener("submit", async function(e){
e.preventDefault();

const file = document.getElementById("fileInput").files[0];

if(!file){
message.textContent = "Please select a file.";
return;
}

submitBtn.disabled = true;
message.textContent = "Processing... Please wait.";

try{
/* ===== Replace this URL with your n8n webhook ===== */
const webhookUrl = "https://your-n8n-webhook-url-here";

/* Simulated response for now */
await new Promise(resolve => setTimeout(resolve, 1500));

/* Dummy result table */
resultDiv.innerHTML = `
<h3>Portfolio Summary</h3>
<table>
<thead>
<tr>
<th>Fund</th>
<th>Investment</th>
<th>Current Value</th>
<th>Gain/Loss</th>
</tr>
</thead>
<tbody>
<tr>
<td>Equity Fund</td>
<td>₹100,000</td>
<td>₹118,000</td>
<td style="color:green;font-weight:600;">+18,000</td>
</tr>
<tr>
<td>Debt Fund</td>
<td>₹50,000</td>
<td>₹52,000</td>
<td style="color:green;font-weight:600;">+2,000</td>
</tr>
</tbody>
</table>
`;

resultDiv.style.display = "block";
message.textContent = "Report Generated Successfully.";

}catch(err){
message.textContent = "Something went wrong.";
}

submitBtn.disabled = false;
});
</script>

</body>
</html>
